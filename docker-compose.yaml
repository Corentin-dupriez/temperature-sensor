services:
  redis:
    image: redis:8.6.2-alpine
    ports:
      - 6379:6379
  postgres:
    image: postgres:latest
    ports:
      - 5432:5432
    environment:
      POSTGRES_PASSWORD: example
    volumes:
      - db-data:/var/lib/postgresql
    networks:
      - backend
volumes:
  db-data:
networks:
  backend:
